{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up | AI Career Coach</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a0033, #3c096c, #7b2cbf);
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(199, 125, 255, 0.25);
            border-left: 5px solid #e0aaff;
            width: 100%;
            max-width: 450px;
        }

        .auth-title {
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
            color: #ffffff;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
        }

        .brand-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: #e0aaff;
        }

        .form-control {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: #fff;
            border-radius: 10px;
        }

        .form-control::placeholder {
            color: #e0aaff;
        }

        .form-control:focus {
            box-shadow: none;
            border: 1px solid #c77dff;
            background: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .btn-main {
            background: linear-gradient(45deg, #9d4edd, #c77dff);
            border: none;
            color: #fff;
            border-radius: 30px;
            padding: 10px;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 15px rgba(199, 125, 255, 0.6);
        }

        .auth-link {
            color: #e0aaff;
            text-decoration: none;
        }

        .auth-link:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="brand-title">AI Career Coach</div>
    <h2 class="auth-title">Sign Up</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <input type="text" name="username" class="form-control" placeholder="Username" required>
        </div>

        <div class="mb-3">
            <input type="email" name="email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password1" class="form-control" placeholder="Password" required>
        </div>

        <div class="mb-3">
            <input type="password" name="password2" class="form-control" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="btn btn-main w-100">Sign Up</button>
    </form>

    <p class="text-center mt-3">
        Already have an account?
        <a href="{% url 'login' %}" class="auth-link">Login</a>
    </p>

    <p class="text-center mt-2">
        <a href="{% url 'home' %}" class="auth-link">← Back to Home</a>
    </p>
</div>

</body>
</html>
