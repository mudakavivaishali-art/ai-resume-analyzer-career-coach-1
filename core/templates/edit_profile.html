{% extends 'base.html' %}
{% block title %}Edit Profile{% endblock %}

{% block page_title %}Edit Profile{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 80vh;">
    <div class="card shadow-lg rounded-5 w-100 mx-auto" style="max-width: 600px; border: none;">

        <!-- Card Header -->
        <div class="card-header bg-gradient text-white text-center rounded-top-5 py-4" style="background: linear-gradient(90deg, #4e54c8, #8f94fb);">
            <h2 class="mb-0"><i class="fa-solid fa-pen-to-square me-2"></i>Edit Profile</h2>
        </div>

        <!-- Card Body -->
        <div class="card-body p-5 bg-white rounded-bottom-5">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-success text-center">{{ message }}</div>
                {% endfor %}
            {% endif %}
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" value="{{ request.user.username }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" value="{{ request.user.email }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" name="first_name" class="form-control" value="{{ request.user.first_name }}">
                </div>
                <div class="mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" name="last_name" class="form-control" value="{{ request.user.last_name }}">
                </div>
                <div class="d-flex gap-3 justify-content-center mt-4">
                    <button type="submit" class="btn btn-primary flex-fill rounded-4 py-2 fw-bold">Save Changes</button>
                    <a href="{% url 'user_settings' %}" class="btn btn-outline-secondary flex-fill rounded-4 py-2 fw-bold">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    input.form-control {
        border-radius: 0.75rem;
        padding: 0.75rem;
    }
</style>
{% endblock %}
